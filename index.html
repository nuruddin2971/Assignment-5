<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment-05</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <section class="flex justify-center items-center bg-[#F8FAFC]">
      <div
        class="w-[520px] h-[729px] bg-[#FFFFFF] rounded-lg flex flex-col justify-center items-center"
      >
        <div class="flex flex-col items-center pb-4">
          <div>
            <img class="pb-3" src="./assets/github-logo.png" alt="" />
          </div>
          <div>
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] text-center">
              Sign in to manage your issues
            </p>
          </div>
        </div>

        <form action="">
          <label for="username" class="font-medium">Username</label>
          <br />
          <input
            id="input-username"
            class="w-[450px] h-[48px] rounded-lg shadow-sm border-[#E4E4E7] p-4 my-2"
            type="text"
            name="username"
            id=""
            placeholder="Enter Username"
          />
          <p class="text-sm text-[#4A00FF]">Default: admin</p>
          <br />
          <label for="password" class="font-medium">Password</label>
          <br />
          <input
            id="input-password"
            class="w-[450px] h-[48px] rounded-lg shadow-sm border-[#E4E4E7] p-4 my-2"
            type="password"
            name="password"
            id=""
            placeholder="Enter Password"
          />
          <p class="text-sm text-[#4A00FF]">Default: admin123</p>
          <br />
          <button
            id="sign-btn"
            class="bg-[#4A00FF] w-[450px] h-[48px] rounded-lg shadow-sm p-4 text-white font-semibold cursor-pointer"
          >
            Sign In
          </button>
        </form>

        <div class="divider px-9">OR</div>

        <div>
          <p class="text-[#64748B] text-center pb-2">Demo Credentials:</p>
          <div
            class="flex flex-col justify-center items-center w-[450px] h-[90px] rounded-lg bg-[#F8FAFC]"
          >
            <h4><span class="font-semibold">Username:</span> admin</h4>
            <h4><span class="font-semibold">Password:</span> admin123</h4>
          </div>
        </div>
      </div>

      
    </section>

    <script src="script/login.js"></script>
  </body>
</html>
