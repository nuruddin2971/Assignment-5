<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment-05 | Main Page</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <header class="bg-[#FFFFFF] shadow-sm">
      <nav
        class="w-11/12 mx-auto flex flex-col md:flex-row justify-center md:justify-between items-center py-5"
      >
        <div class="flex items-center gap-1">
          <img class="w-9 h-9" src="./assets/github-logo.png" alt="" />
          <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div class="flex md:flex-row gap-4">
          <label class="input">
            
            <input id="input-search" type="search" required placeholder="Search issues..." />
          </label>
          <button id="btn-search"
            class="font-semibold bg-[#4A00FF] text-white w-38 h-10 rounded-lg cursor-pointer"
          >
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </nav>
    </header>
    <main class="bg-[#F8FAFC]">
      <section class="tab-section w-9/12 mx-auto py-6">
        <!-- tab div -->
        <div class="bg-[#FFFFFF] h-20 flex items-center px-3 rounded-lg gap-2">
          <button id="tab-all" onclick="switchTab('all')" class="btn btn-outline btn-primary w-24">
            All
        </button>
          <button id="tab-open" onclick="switchTab('open')" class="btn btn-outline btn-primary w-24">
            Open
          </button>
          <button id="tab-closed" onclick="switchTab('closed')" class="btn btn-outline btn-primary w-24">
            Closed
          </button>
        </div>

        

        <!-- issues div -->
        <div
          class="md:flex justify-between bg-[#FFFFFF] md:h-20 rounded-lg mt-4 mb-6 p-5"
        >
          <div class="flex items-center gap-4">
            <div>
              <img
                class="p-2 bg-[#ECE4FF] rounded-full shadow-sm"
                src="./assets/Aperture.png"
                alt=""
              />
            </div>
            <div id="numberIssues">
              
            </div>
          </div>
          <div class="flex items-center justify-center gap-4 mt-2 md:mt-0">
            <div class="flex items-center gap-2">
              <div class="w-4 h-4 bg-green-500 rounded-full shadow-md"></div>
              <p class="">Open</p>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-4 h-4 bg-purple-500 rounded-full shadow-md"></div>
              <p class="">Closed</p>
            </div>
          </div>
        </div>

        <div id="spinner" class="flex justify-center items-center py-10 hidden">
          <span class="loading loading-bars loading-xl"></span>
        </div>

        <!-- card div -->
        <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 bg-[#FFFFFF] rounded-lg">
          <div"></div>
        </div>

      </section>


      <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div id="modal" class="modal-box">
    <div id="details-container" class="space-y-5">
      
    </div>
    
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>

    </main>

    <script src="script/script.js"></script>
  </body>
</html>
