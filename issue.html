<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment-05 | Main Page</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind + daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <header class="bg-[#FFFFFF] shadow-sm">
      <nav
        class="w-11/12 mx-auto flex flex-col md:flex-row justify-center md:justify-between items-center py-5"
      >
        <div class="flex items-center gap-1">
          <img class="w-9 h-9" src="./assets/github-logo.png" alt="" />
          <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div class="flex md:flex-row gap-4">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search" />
          </label>
          <button
            class="font-semibold bg-[#4A00FF] text-white w-38 h-10 rounded-lg cursor-pointer"
          >
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </nav>
    </header>
    <main class="bg-[#F8FAFC]">
      <section class="tab-section w-9/12 mx-auto py-6">
        <!-- tab div -->
        <div class="bg-[#FFFFFF] h-20 flex items-center px-3 rounded-lg gap-2">
          <button id="tab-all" onclick="switchTab('all')" class="btn btn-outline btn-primary w-24">
            All
        </button>
          <button id="tab-open" onclick="switchTab('open')" class="btn btn-outline btn-primary w-24">
            Open
          </button>
          <button id="tab-closed" onclick="switchTab('closed')" class="btn btn-outline btn-primary w-24">
            Closed
          </button>
        </div>

        <!-- issues div -->
        <div
          class="md:flex justify-between bg-[#FFFFFF] md:h-20 rounded-lg mt-4 p-5"
        >
          <div class="flex items-center gap-4">
            <div>
              <img
                class="p-2 bg-[#ECE4FF] rounded-full shadow-sm"
                src="./assets/Aperture.png"
                alt=""
              />
            </div>
            <div>
              <h2 class="font-semibold text-xl">50 Issues</h2>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex items-center justify-center gap-4 mt-2 md:mt-0">
            <div class="flex items-center gap-2">
              <div class="w-4 h-4 bg-green-500 rounded-full shadow-md"></div>
              <p class="">Open</p>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-4 h-4 bg-purple-500 rounded-full shadow-md"></div>
              <p class="">Closed</p>
            </div>
          </div>
        </div>

        <!-- card div -->
        <div  id="card-container" class="grid grid-cols-4 gap-4">
          <div"></div>
        </div>

      


      </section>
    </main>

    <script src="script/script.js"></script>
  </body>
</html>
